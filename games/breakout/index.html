<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ブロックくずし｜ミアの遊び場</title>
  <link rel="stylesheet" href="../../shared/style.css?v=12">
  <link rel="stylesheet" href="style.css?v=12">
</head>
<body>
  <div class="bk">
    <header class="bk-header">
      <div class="bk-header__buttons">
        <button class="pill-btn" id="btn-new">新規ゲーム</button>
        <a class="pill-btn" href="../../index.html">ロビーへ</a>
      </div>
      <div class="bk-header__stats">
        <span class="stat" id="stage-stat" hidden>ステージ <strong id="stage">1</strong></span>
        <span class="stat">スコア <strong id="score">0</strong></span>
        <span class="stat">ライフ <strong id="lives">♥♥♥</strong></span>
        <span class="stat">コンボ <strong id="combo">×0</strong></span>
      </div>
    </header>

    <main class="bk-main">
      <div class="bk-canvas-area">
        <canvas id="game" width="960" height="640"></canvas>
        <div class="bk-hint">操作: A/D または ←→ でパドル　／　Space で発射＆強打（パドル接触±0.1秒）</div>
      </div>
      <aside class="sol-char bk-side">
        <button class="sol-char__portrait" id="char-portrait" aria-label="キャラ">
          <img id="char-img" alt="" hidden>
          <span id="char-fallback" hidden>🐈</span>
        </button>
        <div class="message-window" id="message-window"><span id="message-text"></span></div>
      </aside>
    </main>
  </div>

  <!-- 新規ゲームモーダル -->
  <div class="modal" id="new-modal">
    <div class="modal__inner">
      <h2 class="modal__title">新しいゲーム🧱</h2>
      <p class="bk-modal__label">プレイモード</p>
      <div class="bk-choice" id="choice-mode">
        <button class="bk-opt" data-mode="arcade">アーケード<small>10ステージ通し</small></button>
        <button class="bk-opt" data-mode="free">フリープレイ<small>1ステージ単位</small></button>
      </div>
      <p class="bk-modal__label">ライフ設定</p>
      <div class="bk-choice" id="choice-life">
        <button class="bk-opt" data-life="3">3ライフ<small>カジュアル</small></button>
        <button class="bk-opt" data-life="1">1ライフ<small>ハード</small></button>
        <button class="bk-opt" data-life="inf">無限<small>練習向け</small></button>
      </div>
      <div class="bk-modal__actions">
        <button class="pill-btn pill-btn--accent" id="btn-start">開始</button>
        <button class="pill-btn" id="btn-cancel">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- ステージ選択モーダル（フリープレイ用） -->
  <div class="modal" id="stage-modal">
    <div class="modal__inner">
      <h2 class="modal__title">ステージを選んでね</h2>
      <div class="bk-stage-grid" id="stage-grid"></div>
      <div class="bk-modal__actions">
        <button class="pill-btn" id="btn-stage-back">戻る</button>
      </div>
    </div>
  </div>

  <!-- リザルトモーダル -->
  <div class="modal" id="result-modal">
    <div class="modal__inner">
      <h2 class="modal__title" id="result-title"></h2>
      <div class="result-rows" id="result-rows"></div>
      <div class="modal__options" id="result-actions"></div>
    </div>
  </div>

  <script src="../../shared/storage.js?v=12"></script>
  <script src="../../shared/characters.js?v=12"></script>
  <script src="stages.js?v=12"></script>
  <script src="game.js?v=12"></script>
</body>
</html>
