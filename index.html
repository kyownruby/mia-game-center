<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ミアの遊び場</title>
  <link rel="stylesheet" href="shared/style.css?v=11">
</head>
<body>
  <div class="lobby">
    <header class="lobby-header">
      <div class="lobby-title">ミアの遊び場</div>
      <button class="header-avatar" id="header-avatar" aria-label="アバター切替">
        <span class="header-avatar__icon">
          <img id="avatar-img" alt="" hidden>
          <span id="avatar-emoji" hidden>🌸</span>
        </span>
        <span class="header-avatar__name" id="avatar-name">ご主人</span>
      </button>
    </header>

    <main class="lobby-main">
      <div class="mia-stage">
        <button class="mia-portrait" id="mia-portrait" aria-label="ミア">
          <img class="mia-portrait__img" id="mia-portrait-img" alt="ミア" hidden>
          <span class="mia-portrait__fallback" id="mia-portrait-fallback" hidden>🐈</span>
        </button>
        <div class="message-window" id="message-window">
          <span id="message-text"></span>
        </div>
      </div>

      <div class="game-grid" id="game-grid"></div>
    </main>
  </div>

  <div class="modal" id="avatar-modal" role="dialog" aria-label="アバター切替">
    <div class="modal__inner">
      <h2 class="modal__title">アバターを選んでね💕</h2>
      <div class="modal__options" id="modal-options"></div>
    </div>
  </div>

  <script src="shared/storage.js?v=11"></script>
  <script src="shared/characters.js?v=11"></script>
  <script src="shared/lobby.js?v=11"></script>
</body>
</html>
